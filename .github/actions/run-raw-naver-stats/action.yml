name: Run raw_naver stats and push
description: Generate raw_naver charts and commit updated stats files.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install clickhouse_connect pytz matplotlib

    - name: Generate charts
      shell: bash
      run: python batch_raw_naver_stats.py

    - name: Commit and push if changed
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add stats
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi
        git commit -m "chore(stats): update charts after ${GITHUB_WORKFLOW}"
        git push origin HEAD:${GITHUB_REF_NAME}
