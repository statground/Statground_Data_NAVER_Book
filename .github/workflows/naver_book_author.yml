name: NAVER Book Collector (Author, Go)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true

      - name: Build
        run: go build ./...

      - name: Run collector (author)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          BATCH_SIZE: '500'
          SAMPLE_ROWS: '8000'
          NAVER_DISPLAY: '100'
          REQS_PER_TERM: '1'
          COLLECT_MODE: author
        run: go run ./cmd/collect

      - name: OPTIMIZE raw_naver (random partition)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          OPTIMIZE_ENABLED: '1'
          OPTIMIZE_RECENT_PARTITIONS: '6'
          OPTIMIZE_FINAL: '1'
        run: go run ./cmd/optimize_raw_naver_random_partition

  stats:
    name: Generate stats after collect
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: statground-book-raw-naver-stats
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate stats and push
        uses: ./.github/actions/run-raw-naver-stats
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
