name: NAVER Book Collector (Aladin Publisher Seed)

on:
  schedule:
    # 03:30 KST ~= 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pytz uuid6 clickhouse_connect beautifulsoup4 lxml

      - name: Run batch (Aladin publishers -> Naver -> ClickHouse)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}

          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}

          # Aladin
          ALADIN_PUBLISHER_LIST_URL: 'https://www.aladin.co.kr/aladdin/PublisherList.aspx'
          ALADIN_MAX_WORKERS: '6'
          ALADIN_CACHE_TABLE: 'raw_aladin_publisher_cache'

          # Publisher sample
          PUBLISHER_SAMPLE_N: '100'

          # Naver (collect as much as possible per publisher: paginate up to start<=1000)
          NAVER_DISPLAY: '100'
          REQS_PER_TERM: '1'
          NAVER_MAX_WORKERS: '10'

          # Target
          RAW_NAVER_TABLE: 'raw_naver'
        run: python batch_aladin_publisher_seed.py
      - name: OPTIMIZE raw_naver (random partition)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          OPTIMIZE_ENABLED: '1'
          OPTIMIZE_RECENT_PARTITIONS: '6'
          OPTIMIZE_FINAL: '1'
        run: python optimize_raw_naver_random_partition.py
