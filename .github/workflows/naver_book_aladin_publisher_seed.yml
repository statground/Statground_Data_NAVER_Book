name: NAVER Book Collector (Aladin Publisher Seed)

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install plotters system packages
        run: sudo apt-get update && sudo apt-get install -y pkg-config libfreetype6-dev libfontconfig1-dev

      - name: Run batch (Aladin publishers -> Naver -> ClickHouse)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          ALADIN_PUBLISHER_LIST_URL: 'https://www.aladin.co.kr/aladdin/PublisherList.aspx'
          ALADIN_MAX_WORKERS: '6'
          ALADIN_CACHE_TABLE: 'raw_aladin_publisher_cache'
          PUBLISHER_SAMPLE_N: '100'
          NAVER_DISPLAY: '100'
          REQS_PER_TERM: '1'
          NAVER_MAX_WORKERS: '10'
          RAW_NAVER_TABLE: 'raw_naver'
        run: cargo run --release --bin batch_aladin_publisher_seed

      - name: OPTIMIZE raw_naver (random partition)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          OPTIMIZE_ENABLED: '1'
          OPTIMIZE_RECENT_PARTITIONS: '6'
          OPTIMIZE_FINAL: '1'
        run: cargo run --release --bin optimize_raw_naver_random_partition

  stats:
    name: Generate stats after collect
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: statground-book-raw-naver-stats
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate stats and push
        uses: ./.github/actions/run-raw-naver-stats
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
