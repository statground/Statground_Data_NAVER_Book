name: NAVER Book Manual Search (Go)

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "검색할 키워드를 입력하세요"
        required: true
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true

      - name: Build
        run: go build ./...

      - name: Run manual collector
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          MANUAL_KEYWORD: ${{ github.event.inputs.keyword }}
        run: go run ./cmd/collect_manual

      - name: OPTIMIZE raw_naver (random partition)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          OPTIMIZE_ENABLED: '1'
          OPTIMIZE_RECENT_PARTITIONS: '6'
          OPTIMIZE_FINAL: '1'
        run: go run ./cmd/optimize_raw_naver_random_partition

  stats:
    name: Generate stats after collect
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: statground-book-raw-naver-stats
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Generate stats and push
        uses: ./.github/actions/run-raw-naver-stats
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
