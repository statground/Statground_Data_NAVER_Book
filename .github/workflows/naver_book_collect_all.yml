name: NAVER Book Collector - All Kafka

on:
  schedule:
    - cron: "29 1-23/4 * * *"
  workflow_dispatch:
    inputs:
      manual_keyword:
        description: "Optional manual NAVER Book search keyword. Empty skips the manual step."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: statground-book-naver-all
  cancel-in-progress: true

jobs:
  collect_all:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      KAFKA_WRITE_ATTEMPTS: "5"
      KAFKA_WRITE_BACKOFF_MIN: "1.0"
      KAFKA_WRITE_BACKOFF_MAX: "12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required repository secrets
        env:
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
        run: |
          test -n "$NAVER_API_KEYS" || { echo "NAVER_API_KEYS secret is required"; exit 1; }
          test -n "$KAFKA_BROKERS" || { echo "KAFKA_BROKERS secret is required"; exit 1; }
          test -n "$KAFKA_USERNAME" || { echo "Kafka SASL username is required. Add either KAFKA_USERNAME or KAFKA_EXTERNAL_USER repository secret"; exit 1; }
          test -n "$KAFKA_PASSWORD" || { echo "Kafka SASL password is required. Add either KAFKA_PASSWORD or KAFKA_EXTERNAL_PASSWORD repository secret"; exit 1; }
          python3 - <<'PY'
          import hashlib
          import os

          brokers = os.environ.get("KAFKA_BROKERS", "")
          safe = brokers.replace(".", "[.]").replace(":", "[:]").replace(",", ", ")
          print(f"KAFKA_BROKERS_SANITIZED={safe}")
          print(f"KAFKA_BROKERS_SHA256={hashlib.sha256(brokers.encode()).hexdigest()}")
          PY
          case ",$KAFKA_BROKERS," in
            *,180.66.240.243:50004,*)
              echo "KAFKA_BROKERS still contains a retired broker endpoint"
              exit 1
              ;;
            *,127.0.0.1:*|*,localhost:*|*,0.0.0.0:*|*,[::1]:*)
              echo "KAFKA_BROKERS must be a public IP/domain endpoint, not a loopback address"
              exit 1
              ;;
          esac

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active NAVER Book crawler commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/collect ./cmd/collect_manual ./cmd/batch_aladin_publisher_seed ./cmd/refresh_webr_book_catalog

      - name: Collect Aladin publisher seed and NAVER books via Kafka
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          ALADIN_CACHE_TABLE: Data_Book_NAVER_Log.aladin_publisher_cache
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-aladin-publisher-seed
          ALADIN_PUBLISHER_SEED_REQUIRED: "false"
          PUBLISHER_SAMPLE_N: "100"
          ALADIN_MAX_WORKERS: "6"
          ALADIN_SLEEP_MIN: "0.05"
          ALADIN_SLEEP_MAX: "0.20"
          NAVER_MAX_WORKERS: "10"
          NAVER_SLEEP_MIN: "0.05"
          NAVER_SLEEP_MAX: "0.20"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
          ALADIN_PUBLISHER_MAX_TOTAL: "5000"
        run: |
          go run -mod=mod ./cmd/batch_aladin_publisher_seed

      - name: Collect NAVER books via Kafka (author)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-author
          COLLECT_MODE: author
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (keyword)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-keyword
          COLLECT_MODE: keyword
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (Web-R review keywords)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-webr-review-keyword
          COLLECT_MODE: fixed_keyword
          FIXED_KEYWORDS: "빅데이터 분석 기사, 사회조사분석사, ADsP, ADP"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (MirType language learning keywords)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-mirtype-language-learning
          COLLECT_MODE: fixed_keyword
          FIXED_KEYWORDS: "외국어 학습, 제2외국어, 언어 학습, 언어 공부, 어학 교재, 영어 회화, 영어 문법, 영어 단어, 영어 독해, 영어 듣기, 영어 말하기, TOEIC, TOEFL, IELTS, OPIC, 일본어 기초, 일본어 회화, JLPT, 중국어 회화, 중국어 문법, HSK, 한국어 학습, TOPIK, 러시아어 기초, 러시아어 회화, 스페인어 회화, 프랑스어 회화, 독일어 회화, 이탈리아어 회화, 포르투갈어 회화, 베트남어 회화, 태국어 회화, 아랍어 기초, 힌디어 기초, 인도네시아어 기초, 라틴어 기초, language learning, foreign language vocabulary, grammar workbook, conversation practice"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (publisher)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-publisher
          COLLECT_MODE: publisher
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (R package sample)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-r-package
          COLLECT_MODE: r_package
          R_PACKAGE_SAMPLE_SIZE: "10"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_keyword != '' }}
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_CLIENT_ID: statground-naver-book-manual
          MANUAL_KEYWORD: ${{ inputs.manual_keyword }}
        run: |
          go run -mod=mod ./cmd/collect_manual

      - name: Refresh Web-R and MirType book catalogs
        env:
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: webr_book
          WEBR_BOOK_REFRESH_SETTLE_SECONDS: "30"
          WEBR_BOOK_REFRESH_TIMEOUT_SECONDS: "300"
          MIRTYPE_BOOK_REFRESH_ENABLED: "true"
          MIRTYPE_BOOK_REFRESH_VIEW: mirtype_book.mv_naver_language_book_catalog_refresh
          MIRTYPE_BOOK_COUNT_VIEW: mirtype_book.v_naver_language_book_catalog
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping Web-R and MirType book catalog refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          export CH_PORT="${CH_PORT:-8123}"
          go run -mod=mod ./cmd/refresh_webr_book_catalog
