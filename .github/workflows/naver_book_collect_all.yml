name: NAVER Book Collector - All Kafka

on:
  schedule:
    - cron: "29 1-23/4 * * *"
  workflow_dispatch:
    inputs:
      manual_keyword:
        description: "Optional manual NAVER Book search keyword. Empty skips the manual step."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: statground-book-naver-all
  cancel-in-progress: false

jobs:
  collect_all:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required repository secrets
        env:
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
        run: |
          test -n "$NAVER_API_KEYS" || { echo "NAVER_API_KEYS secret is required"; exit 1; }
          test -n "$KAFKA_BROKERS" || { echo "KAFKA_BROKERS secret is required"; exit 1; }
          test -n "$KAFKA_USERNAME" || { echo "Kafka SASL username is required. Add either KAFKA_USERNAME or KAFKA_EXTERNAL_USER repository secret"; exit 1; }
          test -n "$KAFKA_PASSWORD" || { echo "Kafka SASL password is required. Add either KAFKA_PASSWORD or KAFKA_EXTERNAL_PASSWORD repository secret"; exit 1; }
          case ",$KAFKA_BROKERS," in
            *,127.0.0.1:*|*,localhost:*|*,0.0.0.0:*|*,[::1]:*)
              echo "KAFKA_BROKERS must be a public IP/domain endpoint, not a loopback address"
              exit 1
              ;;
          esac

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active NAVER Book crawler commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/collect ./cmd/collect_manual ./cmd/batch_aladin_publisher_seed

      - name: Collect Aladin publisher seed and NAVER books via Kafka
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          ALADIN_CACHE_TABLE: Data_Book_NAVER_Log.aladin_publisher_cache
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: Data_Book_NAVER_Raw
          KAFKA_CLIENT_ID: statground-naver-book-aladin-publisher-seed
          PUBLISHER_SAMPLE_N: "100"
          ALADIN_MAX_WORKERS: "6"
          ALADIN_SLEEP_MIN: "0.05"
          ALADIN_SLEEP_MAX: "0.20"
          NAVER_MAX_WORKERS: "10"
          NAVER_SLEEP_MIN: "0.05"
          NAVER_SLEEP_MAX: "0.20"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/batch_aladin_publisher_seed

      - name: Collect NAVER books via Kafka (author)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: Data_Book_NAVER_Raw
          KAFKA_CLIENT_ID: statground-naver-book-author
          COLLECT_MODE: author
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (keyword)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: Data_Book_NAVER_Raw
          KAFKA_CLIENT_ID: statground-naver-book-keyword
          COLLECT_MODE: keyword
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (publisher)
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: Data_Book_NAVER_Raw
          KAFKA_CLIENT_ID: statground-naver-book-publisher
          COLLECT_MODE: publisher
          BATCH_SIZE: "500"
          SAMPLE_ROWS: "8000"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via Kafka (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_keyword != '' }}
        env:
          INGEST_MODE: kafka
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: book.events
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: Data_Book_NAVER_Raw
          KAFKA_CLIENT_ID: statground-naver-book-manual
          MANUAL_KEYWORD: ${{ inputs.manual_keyword }}
        run: |
          go run -mod=mod ./cmd/collect_manual
