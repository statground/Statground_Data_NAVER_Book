name: NAVER Book Collector - Direct DB

on:
  schedule:
    - cron: "29 1-23/4 * * *"
  workflow_dispatch:
    inputs:
      manual_keyword:
        description: "Optional manual NAVER Book search keyword. Empty skips the manual step."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: statground-book-naver-all
  cancel-in-progress: true

jobs:
  collect_all:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      DB_PREFLIGHT_REQUIRED: "true"
      DB_LOG_WRITE_TIMEOUT_SECONDS: "60"
      DB_LOG_BEST_EFFORT_TIMEOUT_SECONDS: "8"
      COLLECT_TERM_REQUIRED: "false"
      COLLECT_REQUIRE_SUCCESSFUL_TERM: "false"
      COLLECT_MAX_CONSECUTIVE_FAILURES: "20"
      COLLECT_SLEEP_MIN: "0.05"
      COLLECT_SLEEP_MAX: "0.20"
      EXISTING_ISBN_LOOKUP_ENABLED: "false"
      SEARCH_LOG_REQUIRED: "false"
      NAVER_API_ATTEMPTS: "3"
      NAVER_API_BACKOFF_MIN: "0.5"
      NAVER_API_BACKOFF_MAX: "4.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required repository secrets
        env:
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
        run: |
          test -n "$NAVER_API_KEYS" || { echo "NAVER_API_KEYS secret is required"; exit 1; }
          test -n "$CH_HOST" || { echo "CLICKHOUSE_HOST or CH_HOST secret is required"; exit 1; }
          test -n "$CH_USER" || { echo "CLICKHOUSE_USER or CH_USER secret is required"; exit 1; }
          test -n "$CH_PASSWORD" || { echo "CLICKHOUSE_PASSWORD or CH_PASSWORD secret is required"; exit 1; }
          python3 - <<'PY'
          import hashlib
          import os

          host = os.environ.get("CH_HOST", "")
          safe = host.replace(".", "[.]").replace(":", "[:]")
          print(f"CLICKHOUSE_HOST_SANITIZED={safe}")
          print(f"CLICKHOUSE_HOST_SHA256={hashlib.sha256(host.encode()).hexdigest()}")
          PY
          case "$CH_HOST" in
            127.0.0.1|localhost|0.0.0.0|::1|[::1])
              echo "ClickHouse host must be reachable from GitHub Actions, not a loopback address"
              exit 1
              ;;
          esac

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active NAVER Book crawler commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/collect ./cmd/collect_manual ./cmd/batch_aladin_publisher_seed ./cmd/refresh_webr_book_catalog

      - name: Collect Aladin publisher seed and NAVER books via direct DB
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          ALADIN_CACHE_TABLE: Data_Book_NAVER_Log.aladin_publisher_cache
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          ALADIN_PUBLISHER_SEED_REQUIRED: "false"
          ALADIN_PUBLISHER_CACHE_REQUIRED: "false"
          ALADIN_PUBLISHER_COLLECTION_REQUIRED: "false"
          ALADIN_HTTP_ATTEMPTS: "3"
          ALADIN_HTTP_BACKOFF_MIN: "0.5"
          ALADIN_HTTP_BACKOFF_MAX: "4.0"
          PUBLISHER_SAMPLE_N: "30"
          ALADIN_MAX_WORKERS: "6"
          ALADIN_SLEEP_MIN: "0.05"
          ALADIN_SLEEP_MAX: "0.20"
          NAVER_MAX_WORKERS: "2"
          NAVER_SLEEP_MIN: "0.05"
          NAVER_SLEEP_MAX: "0.20"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
          ALADIN_PUBLISHER_MAX_TOTAL: "5000"
        run: |
          go run -mod=mod ./cmd/batch_aladin_publisher_seed

      - name: Collect NAVER books via direct DB (author)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: author
          BATCH_SIZE: "120"
          SAMPLE_ROWS: "4000"
          NAVER_DISPLAY: "50"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (keyword)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: keyword
          BATCH_SIZE: "120"
          SAMPLE_ROWS: "4000"
          NAVER_DISPLAY: "50"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (Web-R review keywords)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: fixed_keyword
          COLLECT_MAX_CONSECUTIVE_FAILURES: "3"
          FIXED_KEYWORDS: "빅데이터 분석 기사, 사회조사분석사, ADsP, ADP"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (MirType language learning keywords)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: fixed_keyword
          COLLECT_MAX_CONSECUTIVE_FAILURES: "3"
          FIXED_KEYWORDS: "외국어 학습, 제2외국어, 언어 학습, 언어 공부, 어학 교재, 영어 회화, 영어 문법, 영어 단어, 영어 독해, 영어 듣기, 영어 말하기, TOEIC, TOEFL, IELTS, OPIC, 일본어 기초, 일본어 회화, JLPT, 중국어 회화, 중국어 문법, HSK, 한국어 학습, TOPIK, 러시아어 기초, 러시아어 회화, 스페인어 회화, 프랑스어 회화, 독일어 회화, 이탈리아어 회화, 포르투갈어 회화, 베트남어 회화, 태국어 회화, 아랍어 기초, 힌디어 기초, 인도네시아어 기초, 라틴어 기초, language learning, foreign language vocabulary, grammar workbook, conversation practice"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (publisher)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: publisher
          BATCH_SIZE: "120"
          SAMPLE_ROWS: "4000"
          NAVER_DISPLAY: "50"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (R package sample)
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          BOOK_SAMPLE_TABLE: Data_Book_NAVER_Service.naver_book_latest
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          COLLECT_MODE: r_package
          R_PACKAGE_SAMPLE_SIZE: "10"
          NAVER_DISPLAY: "100"
          REQS_PER_TERM: "1"
        run: |
          go run -mod=mod ./cmd/collect

      - name: Collect NAVER books via direct DB (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_keyword != '' }}
        env:
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          RAW_NAVER_TABLE: naver_book_raw
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: Data_Book_NAVER_Raw
          NAVER_API_KEYS: ${{ secrets.NAVER_API_KEYS }}
          DB_PREFLIGHT_REQUIRED: "true"
          SEARCH_LOG_REQUIRED: "true"
          MANUAL_KEYWORD: ${{ inputs.manual_keyword }}
        run: |
          go run -mod=mod ./cmd/collect_manual

      - name: Refresh Web-R and MirType book catalogs
        env:
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          CH_DATABASE: webr_book
          WEBR_BOOK_REFRESH_SETTLE_SECONDS: "30"
          WEBR_BOOK_REFRESH_TIMEOUT_SECONDS: "300"
          MIRTYPE_BOOK_REFRESH_ENABLED: "true"
          MIRTYPE_BOOK_REFRESH_VIEW: mirtype_book.mv_naver_language_book_catalog_refresh
          MIRTYPE_BOOK_COUNT_VIEW: mirtype_book.v_naver_language_book_catalog
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping Web-R and MirType book catalog refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          export CH_PORT="${CH_PORT:-8123}"
          go run -mod=mod ./cmd/refresh_webr_book_catalog

      - name: Refresh MirType provider practice content
        env:
          CH_HOST: ${{ secrets.CLICKHOUSE_HOST || secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CLICKHOUSE_PORT || secrets.CH_PORT }}
          CH_USER: ${{ secrets.CLICKHOUSE_USER || secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD || secrets.CH_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping MirType provider practice content refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          CH_PORT="${CH_PORT:-8123}"
          CH_PROTOCOL="${CH_PROTOCOL:-http}"
          CH_BASE_URL="${CH_PROTOCOL}://${CH_HOST}:${CH_PORT}/${CH_HTTP_URL_PATH}"
          curl --fail --silent --show-error --max-time 300 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SYSTEM REFRESH VIEW mirtype_content.mv_provider_practice_content_refresh"
          curl --fail --silent --show-error --max-time 60 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SELECT * FROM mirtype_content.v_provider_practice_content_current FORMAT TSVWithNames"
